<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Where to next · Addis date spots</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<style>
:root{
  --bg:#FFFFFF; --bg-2:#FFFFFF;
  --surface:transparent; --surface-2:transparent;
  --ink:#2B3A2E; --ink-soft:#586256; --muted:#8A8170;
  --line:#E2D7C2; --line-soft:#ECE3D1;
  --green:#3E5C44; --green-deep:#2C4232; --sage:#7E9579;
  --terracotta:#E37B33; --amber:#E6A94F; --gold:#EFC877;
  --accent:#E37B33; --primary:#3E5C44; --hero-a:#3E5C44; --hero-b:#E37B33;
  --star-fill:#C99A3F; --star-empty:#E0D6C2;
  --shadow:0 1px 2px rgba(44,52,40,.05), 0 10px 30px -18px rgba(44,52,40,.35);
  --radius:16px;
  --serif-d:"Poppins", system-ui, sans-serif;
  --serif-b:"Poppins", system-ui, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  background:#FFFFFF;
  color:var(--ink);
  font-family:var(--serif-b);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
.app{ max-width:1240px; margin:0 auto; padding:34px 34px 80px; }

/* ---------- topbar ---------- */
.topbar{ display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:24px; }
.brand{ display:flex; align-items:center; gap:16px; }
.brand-mark{
  width:46px; height:46px; border-radius:50%; flex:none;
  background:
    radial-gradient(circle at 50% 120%, var(--gold) 0%, var(--terracotta) 38%, transparent 39%),
    linear-gradient(180deg, #BBD0E8 0%, #E9E0CE 55%, var(--green) 56%, var(--green-deep) 100%);
  box-shadow:inset 0 0 0 1px rgba(43,58,46,.12), var(--shadow);
}
.brand-text h1{ font-family:var(--serif-d); font-weight:500; font-size:23.5px; line-height:1.05; margin:0 0 4px; letter-spacing:.2px; color:var(--ink); }
.brand-text p{ margin:0; font-size:13px; color:var(--ink-soft); font-style:italic; }
.brand-count{ font-size:11.5px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; white-space:nowrap; }

/* ---------- controls ---------- */
.controls{
  display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap;
  background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); margin-bottom:22px;
}
.ctrl{ display:flex; flex-direction:column; gap:6px; }
.ctrl label{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600; }

/* custom dropdown */
.dd{ position:relative; }
.dd-trigger{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  font-family:var(--serif-b); font-size:13.5px; color:var(--ink); cursor:pointer;
  min-width:178px; width:100%; text-align:left;
  background:#fff; border:1px solid var(--line); border-radius:11px; padding:10px 13px;
  transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
}
.dd-trigger:hover{ border-color:var(--sage); }
.dd.open .dd-trigger{ border-color:var(--primary); box-shadow:0 0 0 3px rgba(62,92,68,.12); }
.dd-value{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.dd-caret{ display:flex; color:var(--muted); transition:transform .2s ease; flex:none; }
.dd.open .dd-caret{ transform:rotate(180deg); color:var(--primary); }

.dd-menu{
  position:absolute; top:calc(100% + 6px); left:0; z-index:50; min-width:100%; width:max-content; max-width:300px;
  background:#fff; border:1px solid var(--line); border-radius:12px; padding:6px;
  box-shadow:0 4px 12px -4px rgba(44,52,40,.12), 0 18px 40px -16px rgba(44,52,40,.32);
  animation:dd-in .14s ease; max-height:320px; overflow:auto;
}
.dd-right{ left:auto; right:0; }
@keyframes dd-in{ from{ opacity:0; transform:translateY(-4px); } to{ opacity:1; transform:translateY(0); } }
.dd-opt{
  display:flex; align-items:center; justify-content:space-between; gap:14px; width:100%;
  font-family:var(--serif-b); font-size:13px; color:var(--ink-soft); cursor:pointer;
  background:transparent; border:none; border-radius:8px; padding:8px 11px; text-align:left;
  white-space:nowrap; transition:background .12s ease, color .12s ease;
}
.dd-opt:hover{ background:rgba(62,92,68,.07); color:var(--ink); }
.dd-opt.sel{ color:var(--primary); font-weight:600; background:rgba(62,92,68,.07); }
.dd-check{ color:var(--accent); font-size:11.5px; flex:none; }
.ctrl-spacer{ flex:1 1 auto; }
.surprise{
  font-family:var(--serif-d); font-weight:500; font-size:13.5px; letter-spacing:.2px;
  color:#fff; background:var(--accent); border:none; border-radius:12px;
  padding:11px 22px; cursor:pointer; display:inline-flex; align-items:center; gap:9px;
  box-shadow:0 8px 20px -10px var(--accent); transition:transform .12s ease, filter .15s ease;
  white-space:nowrap;
}
.surprise:hover{ filter:brightness(1.05); transform:translateY(-1px); }
.surprise:active{ transform:translateY(0); }
.surprise .dice{ font-size:18px; line-height:1; }

/* ---------- spot card ---------- */
.spotcard{
  display:grid; grid-template-columns:1.05fr .95fr; gap:0;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow); margin-bottom:38px;
}
.spot-left{ padding:24px 26px 22px; display:flex; flex-direction:column; }
.spot-cover{
  height:120px; border-radius:12px; background-size:cover; background-position:center;
  position:relative; margin-bottom:18px; overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
}
.spot-cover::after{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, transparent 30%, rgba(20,28,20,.35)); }
.cover-area, .cover-count{ position:absolute; z-index:1; font-family:var(--serif-b); font-size:11px; color:#fff; }
.cover-area{ top:12px; left:14px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; background:rgba(20,28,20,.32); padding:4px 10px; border-radius:20px; backdrop-filter:blur(2px); }
.cover-count{ bottom:12px; left:14px; opacity:.92; font-style:italic; }

.spot-headrow{ display:flex; align-items:baseline; justify-content:space-between; gap:14px; }
.spot-name{ font-family:var(--serif-d); font-weight:500; font-size:24.5px; line-height:1.1; margin:0; color:var(--ink); }
.been-btn{
  flex:none; font-family:var(--serif-b); font-size:12px; font-weight:600; cursor:pointer;
  color:var(--primary); background:transparent; border:1px solid var(--line);
  border-radius:20px; padding:7px 15px; transition:all .15s ease; white-space:nowrap;
}
.been-btn:hover{ border-color:var(--primary); background:var(--surface-2); }
.been-btn.on{ background:var(--primary); color:#fff; border-color:var(--primary); }

.spot-loc{ display:flex; align-items:center; gap:8px; color:var(--ink-soft); font-size:13px; margin-top:8px; }
.loc-dot{ width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none; box-shadow:0 0 0 3px rgba(197,107,58,.18); }

.spot-summary{ font-size:14px; line-height:1.55; color:var(--ink-soft); margin:14px 0 0; text-wrap:pretty; }

.spot-tags{ display:flex; flex-wrap:wrap; gap:7px; margin-top:16px; }
.tag{ font-size:11.5px; color:var(--green-deep); background:var(--surface-2); border:1px solid var(--line); border-radius:20px; padding:4px 11px; letter-spacing:.02em; }

.spot-meta{ display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-top:22px; padding-top:20px; border-top:1px solid var(--line-soft); }
.meta-block{ min-width:0; }
.meta-label{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:7px; }
.rating-line{ display:flex; align-items:center; gap:10px; }
.rating-num{ font-family:var(--serif-d); font-size:17px; font-weight:500; color:var(--ink); }
.meta-sub{ font-size:11.5px; color:var(--muted); margin-top:5px; font-style:italic; }

.starmeter{ position:relative; display:inline-block; white-space:nowrap; }
.starmeter-bg{ display:block; }
.starmeter-fg{ position:absolute; top:0; left:0; overflow:hidden; display:block; white-space:nowrap; }

.price-line{ display:flex; align-items:center; gap:10px; }
.price-dots{ font-size:18px; letter-spacing:1px; }
.price-dots b{ color:var(--accent); font-weight:700; }
.price-dots i{ color:var(--star-empty); font-style:normal; }
.price-val{ font-family:var(--serif-d); font-size:15.5px; font-weight:500; color:var(--ink); }

.breakdown{ margin-top:14px; display:flex; flex-direction:column; gap:6px; }
.bd-row{ display:grid; grid-template-columns:64px 1fr 26px; align-items:center; gap:9px; }
.bd-label{ font-size:11px; color:var(--ink-soft); }
.bd-track{ height:6px; background:var(--surface-2); border-radius:6px; overflow:hidden; border:1px solid var(--line-soft); }
.bd-fill{ display:block; height:100%; background:var(--accent); border-radius:6px; }
.bd-num{ font-size:11px; color:var(--muted); text-align:right; }

.spot-nav{ display:flex; align-items:center; justify-content:center; gap:20px; margin-top:auto; padding-top:22px; }
.navbtn{
  width:42px; height:42px; border-radius:50%; border:1px solid var(--line); background:var(--surface-2);
  color:var(--ink); font-size:20px; line-height:1; cursor:pointer; transition:all .15s ease;
  display:flex; align-items:center; justify-content:center; padding-bottom:2px;
}
.navbtn:hover{ border-color:var(--primary); color:var(--primary); background:var(--surface); }
.nav-count{ font-family:var(--serif-d); font-size:13.5px; color:var(--ink-soft); min-width:74px; text-align:center; }
.nav-count i{ font-style:italic; color:var(--muted); font-size:13.5px; }

.spot-right{ position:relative; background:var(--surface-2); border-left:1px solid var(--line); min-height:430px; }
.map-el{ position:absolute; inset:0; }

/* leaflet pin */
.spot-pin-wrap{ background:none; border:none; }
.spot-pin{
  display:block; width:20px; height:20px; border-radius:50% 50% 50% 0;
  transform:rotate(-45deg); background:var(--accent);
  border:2.5px solid #fff; box-shadow:0 3px 8px rgba(44,52,40,.4);
}
.leaflet-container{ font-family:var(--serif-b); background:var(--surface-2); }

/* ---------- visited ---------- */
.visited-section{ }
.vs-head{ display:flex; align-items:baseline; justify-content:space-between; gap:14px; margin-bottom:14px; }
.vs-head h3{ font-family:var(--serif-d); font-weight:500; font-size:19px; margin:0; color:var(--ink); }
.vs-sub{ font-size:11.5px; color:var(--muted); font-style:italic; }

.visited-table{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.vt-head, .vt-row{
  display:grid; grid-template-columns:1.7fr .9fr .6fr 1.1fr .9fr 2.4fr 32px;
  align-items:center; gap:14px; padding:13px 18px;
}
.vt-head{ background:var(--surface-2); border-bottom:1px solid var(--line); }
.vt-head span{ font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:var(--muted); font-weight:600; }
.vt-row{ border-bottom:1px solid var(--line-soft); }
.vt-row:last-child{ border-bottom:none; }
.vt-row:hover{ background:var(--surface-2); }
.vt-place{ font-family:var(--serif-d); font-size:13.5px; font-weight:500; color:var(--ink); }
.vt-row span{ font-size:12.5px; color:var(--ink-soft); }
.vt-c-date{ color:var(--muted); font-size:11.5px; }

.edit-stars{ display:inline-flex; gap:1px; }
.edit-star{ background:none; border:none; cursor:pointer; font-size:16px; line-height:1; padding:0; transition:transform .1s ease; }
.edit-star:hover{ transform:scale(1.15); }

.note-input{
  width:100%; resize:vertical; font-family:var(--serif-b); font-size:12px; line-height:1.45;
  color:var(--ink); background:var(--surface-2); border:1px solid var(--line-soft);
  border-radius:9px; padding:7px 10px; min-height:42px;
}
.note-input:focus{ outline:none; border-color:var(--primary); background:var(--surface); box-shadow:0 0 0 3px rgba(62,92,68,.1); }
.note-input::placeholder{ color:var(--muted); font-style:italic; }

.vt-remove{ width:26px; height:26px; border-radius:50%; border:1px solid transparent; background:transparent; color:var(--muted); font-size:16px; cursor:pointer; line-height:1; transition:all .15s ease; }
.vt-remove:hover{ background:rgba(197,107,58,.12); color:var(--accent); border-color:rgba(197,107,58,.3); }

.visited-empty{ background:var(--surface); border:1px dashed var(--line); border-radius:var(--radius); padding:34px; text-align:center; color:var(--muted); font-style:italic; font-size:13.5px; }

.noresults{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:48px; text-align:center; color:var(--ink-soft); font-size:16px; margin-bottom:38px; }
.noresults button{ font-family:var(--serif-b); color:var(--accent); background:none; border:none; text-decoration:underline; cursor:pointer; font-size:16px; }

@media (max-width:900px){
  .spotcard{ grid-template-columns:1fr; }
  .spot-right{ min-height:300px; border-left:none; border-top:1px solid var(--line); order:-1; }
  .vt-head{ display:none; }
  .vt-row{ grid-template-columns:1fr 1fr; gap:6px 14px; padding:14px 16px; }
  .vt-c-notes{ grid-column:1 / -1; }
  .vt-c-x{ position:absolute; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/spots-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
